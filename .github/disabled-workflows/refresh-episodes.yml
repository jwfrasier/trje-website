name: Refresh episodes from YouTube RSS

on:
  schedule:
    # Daily at 14:00 UTC (~9am CT / 7am PT). Adjust as needed.
    - cron: '0 14 * * *'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab.

permissions:
  contents: write

concurrency:
  group: refresh-episodes
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN to commit. For deploy hooks downstream
          # (Vercel, Netlify, Cloudflare), the push to main will trigger them.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest episodes
        run: node scripts/fetch-episodes.mjs

      - name: Commit if changed
        run: |
          git config user.name "trje-bot"
          git config user.email "trje-bot@users.noreply.github.com"

          if git diff --quiet --exit-code src/data/episodes.json; then
            echo "No changes; episodes.json is up to date."
            exit 0
          fi

          git add src/data/episodes.json
          git commit -m "chore(episodes): refresh from YouTube RSS

          Pulled latest from https://www.youtube.com/@therealjesusexperience
          $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
