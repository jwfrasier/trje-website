<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="oklch(14% 0.012 30)"/>

  <!-- Subtle red corner glow, mirroring the about hero -->
  <defs>
    <radialGradient id="glow1" cx="82%" cy="18%" r="55%">
      <stop offset="0%" stop-color="oklch(58% 0.22 25)" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="oklch(58% 0.22 25)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="8%" cy="92%" r="60%">
      <stop offset="0%" stop-color="oklch(58% 0.22 25)" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="oklch(58% 0.22 25)" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Top label -->
  <text x="80" y="110"
    font-family="'Karla','Helvetica Neue',Arial,sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="3.6"
    fill="oklch(58% 0.22 25)">A PODCAST &amp; MINISTRY</text>

  <!-- The (typeset) -->
  <text x="80" y="230"
    font-family="'Oswald','Bebas Neue','Arial Narrow',sans-serif"
    font-size="92"
    font-weight="500"
    letter-spacing="-1"
    fill="oklch(96% 0.012 70)">THE</text>

  <!-- REAL (brush approximation in cardinal red) -->
  <text x="225" y="245"
    font-family="'Brush Script MT','Snell Roundhand','Lucida Handwriting',cursive"
    font-size="150"
    font-style="italic"
    font-weight="700"
    fill="oklch(58% 0.22 25)"
    transform="rotate(-4 225 245)">Real</text>

  <!-- JESUS EXPERIENCE -->
  <text x="80" y="350"
    font-family="'Oswald','Bebas Neue','Arial Narrow',sans-serif"
    font-size="92"
    font-weight="500"
    letter-spacing="-1"
    fill="oklch(96% 0.012 70)">JESUS EXPERIENCE</text>

  <!-- Hairline rule -->
  <rect x="80" y="430" width="160" height="1" fill="oklch(32% 0.012 30)"/>

  <!-- Tagline -->
  <text x="80" y="495"
    font-family="'Karla','Helvetica Neue',Arial,sans-serif"
    font-size="34"
    font-weight="500"
    fill="oklch(96% 0.012 70)">Conversations for the long road of faith.</text>

  <!-- Footer line -->
  <text x="80" y="555"
    font-family="'Karla','Helvetica Neue',Arial,sans-serif"
    font-size="20"
    font-weight="500"
    letter-spacing="2"
    fill="oklch(68% 0.012 60)">501(C)(3) NONPROFIT  ·  THEREALJESUSEXPERIENCE.COM</text>
</svg>
